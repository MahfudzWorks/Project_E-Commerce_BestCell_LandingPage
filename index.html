<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="styleLogin.css" />
  </head>
  <body>
    <div class="login">
      <nav>
        <img src="img/logo/Best Cell Logo.svg" alt="" />
      </nav>
      <div class="loginContainer">
        <div class="leftPanel">
          <img
            src="img/logo/Best Cell Store 2.svg"
            alt="Best Cell Logo"
            class="mainLogo"
          />
          <h2>Beli Gadget Mudah hanya di Best Cell Store</h2>
          <p>Gabung dan Dapatkan Voucher Gratis Ongkir</p>
        </div>
        <div class="rightPanel">
          <div class="loginPanel">
            <h1>Login</h1>
            <p>
              Belum punya akun Best Cell?
              <a href="/registrasi.html">Registrasi</a>
            </p>
            <div class="loginGoogle">
              <a href=""
                ><img src="img/icon/Google.svg" alt="Google Icon" /> Google</a
              >
            </div>
            <p>atau</p>
            <form action="#">
              <input
                type="text"
                name="email"
                placeholder="Username atau E-mail"
              />
              <input type="password" name="password" placeholder="Password" />
              <a href="">Forgot Password</a>
              <button type="button" onclick="window.location.href='/dashboard.html'">
                Login
              </button>
            </form>
          </div>
        </div>
      </div>
      <footer>
        <p>
          ©2024 <a href="https://BestCellStore.com">BestCellStore.com</a> by PT.
          BestCell
        </p>
      </footer>
    </div>
  </body>
</html>
